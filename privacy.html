<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Privacy Policy — Praxis</title>
<style>
  :root{--bg:#0A0F1E;--ink:#FFFFFF;--muted:#9AAACB;--dim:#5E6E8F;--accent:#5B9BD5;--line:rgba(255,255,255,.07)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.65}
  .wrap{max-width:760px;margin:0 auto;padding:0 24px 96px}
  nav{display:flex;align-items:center;justify-content:space-between;padding:28px 0}
  .wordmark{font-size:15px;font-weight:700;letter-spacing:.35em;color:var(--accent);text-decoration:none}
  nav a.back{color:var(--dim);text-decoration:none;font-size:14px}
  nav a.back:hover{color:var(--muted)}
  h1{font-size:34px;font-weight:800;letter-spacing:-.02em;margin:48px 0 8px}
  .updated{color:var(--dim);font-size:13px;margin-bottom:36px}
  .policy{color:var(--muted);font-size:15px}
  .policy h2{color:var(--ink);font-size:19px;margin:32px 0 10px}
  .policy p{margin-bottom:14px}
</style>
</head>
<body>
<div class="wrap">
  <nav>
    <a class="wordmark" href="/">PRAXIS</a>
    <a class="back" href="/">&larr; Back</a>
  </nav>
  <h1>Privacy Policy</h1>
  <p class="updated">Last updated: [DATE]</p>
  <div class="policy">
    <!-- PASTE YOUR TERMLY-GENERATED PRIVACY POLICY BELOW THIS LINE -->
    <p>[Privacy policy content goes here.]</p>
    <!-- END POLICY -->
  </div>
</div>
</body>
</html>
